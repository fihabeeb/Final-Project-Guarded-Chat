services:
  client:
    build: ./client
    ports:
      - "3000:5173"
    volumes:
      - ./client:/usr/src/app
      - /usr/src/app/node_modules
    environment:
      - NODE_ENV=development
      - VITE_SOCKET_URL=http://localhost:5000  # For browser connection

  server:
    build: ./server
    ports:
      - "5000:1111"
    volumes:
      - ./server:/usr/src/app
      - /usr/src/app/node_modules
    environment:
      - NODE_ENV=development